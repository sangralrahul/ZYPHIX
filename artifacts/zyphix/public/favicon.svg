<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22E88A"/>
      <stop offset="35%"  stop-color="#0DC268"/>
      <stop offset="70%"  stop-color="#09A058"/>
      <stop offset="100%" stop-color="#067A45"/>
    </linearGradient>
    <linearGradient id="shine" x1="80" y1="0" x2="360" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.36"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip"><rect width="512" height="512" rx="116"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- Glassy shine -->
  <ellipse cx="210" cy="180" rx="270" ry="215" fill="url(#shine)" clip-path="url(#clip)"/>

  <!--
    "//" mark — centered.
    y span: 115 → 397 (height = 282px). Vertical center = 256 ✓
    Lean per slash: 110px. Width per slash: 55px. Gap: 20px.
    Total horizontal span = 110+55 + 20 + 110+55 = 350px.
    Centering: start_x = (512-350)/2 = 81.
    Horizontal center = 81 + 350/2 = 256 ✓

    Slash 1: BL(81,397) BR(136,397) TR(246,115) TL(191,115)
    Slash 2: BL(156,397) BR(211,397) TR(321,115) TL(266,115)
      (gap = 156-136 = 20px ✓)
    Span check: rightmost=321, leftmost=81 → center=(81+321)/2=201 ✗

    Corrected — start_x = 136 so center = 256:
    Slash 1: BL(136,397) BR(191,397) TL(246,115) TR(301,115)
    Slash 2: BL(211,397) BR(266,397) TL(321,115) TR(376,115)
    Span: 136 → 376, center = 256 ✓
  -->

  <!-- Slash 1 -->
  <path d="M 136 397  L 191 397  L 301 115  L 246 115  Z"
        fill="white" opacity="0.97"/>

  <!-- Slash 2 -->
  <path d="M 211 397  L 266 397  L 376 115  L 321 115  Z"
        fill="white" opacity="0.97"/>

  <!-- Bottom depth vignette -->
  <rect x="0" y="355" width="512" height="157" fill="#000" opacity="0.06" clip-path="url(#clip)"/>
</svg>
